add_newline = false
palette = "dracula"

[cmd_duration]
disabled = true

[directory]
truncation_length = 1
style = 'bold purple'

[gcloud]
disabled = true

[git_branch]
format = '[\($branch\)]($style)'
only_attached = true
style = 'bold cyan'

[git_commit]
format = '[\($hash$tag\)]($style)'
style = 'bold cyan'

[git_status]
ahead = ''
behind = ''
deleted = '✘'
diverged = ''
modified = '✘'
renamed = '✘'
staged = '✘'
stashed = ''
untracked = '✘'
format = ' ([$all_status$ahead_behind]($style) )'

[line_break]
disabled = true

[nodejs]
disabled = true

[package]
disabled = true

[python]
symbol = ''
version_format = ''
disabled = true

[shell]
disabled = false
format = '[$indicator]($style)'
bash_indicator = '🔨 '
fish_indicator = '󰈺 '
zsh_indicator = ''

[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"

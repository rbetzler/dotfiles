add_newline = true
palette = "dracula"

[directory]
truncation_length = 1

[gcloud]
disabled = true

[git_branch]
format = '[\($branch(:$remote_branch)\)]($style)'

[git_status]
deleted = '✘'
diverged = ''
modified = '✘'
stashed = ''
untracked = '✘'
format = ' ([$all_status$ahead_behind]($style) )'

[line_break]
disabled = true

[nodejs]
disabled = true

[package]
disabled = true

[python]
symbol = ''
version_format = ''
disabled = true

[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"
